name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run — skip git push and npm publish'
        type: boolean
        default: false
      firstRelease:
        description: 'First release — no previous tag to diff against'
        type: boolean
        default: false

# contents: write  → create GitHub releases, push version commit + tag
# id-token: write  → npm trusted publishing (OIDC — no token needed)
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # full history so nx release can read all commits
          token: ${{ secrets.GITHUB_TOKEN }}

      # registry-url writes an .npmrc pointing at registry.npmjs.org.
      # Without NODE_AUTH_TOKEN set, npm falls through to OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Determines version bump from conventional commits since the last tag,
      # updates tools/openapi-resource-gen/package.json, writes CHANGELOG.md,
      # creates a git commit + tag, and opens a GitHub Release (draft: false).
      - name: Bump version and generate changelog
        run: |
          FLAGS="--skip-publish"
          [[ "${{ inputs.firstRelease }}" == "true" ]] && FLAGS="$FLAGS --first-release"
          npx nx release $FLAGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dry-run stops here — all subsequent steps touch the remote or npm registry.
      - name: Push version commit and tag
        if: ${{ !inputs.dryRun }}
        run: git push --follow-tags origin master

      # Build after version bump. Nx Cloud may cache the old version; explicitly
      # write the bumped version into dist/package.json after building.
      - name: Build
        run: npx nx build openapi-resource-gen --skip-nx-cache

      - name: Sync version into dist
        run: |
          VERSION=$(node -p "require('./tools/openapi-resource-gen/package.json').version")
          echo "Syncing version $VERSION into dist"
          node -e "
            const fs = require('fs');
            const p = 'dist/tools/openapi-resource-gen/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      # Trusted publishing: manually exchange the GitHub OIDC token for a
      # temporary npm token via npmjs.com's OIDC endpoint, then publish.
      # npm 10.x does not auto-trigger the OIDC flow; the exchange must be
      # done explicitly. Requires a Trusted Publisher configured on npmjs.com.
      - name: Exchange OIDC token for temporary npm token
        if: ${{ !inputs.dryRun }}
        run: |
          echo "Step 1: requesting GitHub OIDC token (audience=npm)..."
          OIDC_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}")
          OIDC_STATUS=$(echo "$OIDC_RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          OIDC_BODY=$(echo "$OIDC_RESP" | sed '/HTTP_STATUS:/d')
          echo "OIDC status: $OIDC_STATUS"
          OIDC_TOKEN=$(echo "$OIDC_BODY" | jq -r '.value')
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "ERROR: failed to get OIDC token. Body: $OIDC_BODY"
            exit 1
          fi
          echo "OIDC token obtained (${#OIDC_TOKEN} chars)"

          echo "Step 2: exchanging OIDC token at npmjs.com..."
          NPM_RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://registry.npmjs.org/-/oidc/token" \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${OIDC_TOKEN}\"}")
          NPM_STATUS=$(echo "$NPM_RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          NPM_BODY=$(echo "$NPM_RESP" | sed '/HTTP_STATUS:/d')
          echo "npmjs.com OIDC status: $NPM_STATUS"
          if [ "$NPM_STATUS" != "200" ]; then
            echo "ERROR: OIDC exchange failed. Body: $NPM_BODY"
            exit 1
          fi
          NPM_TOKEN=$(echo "$NPM_BODY" | jq -r '.token')
          echo "::add-mask::${NPM_TOKEN}"
          echo "NPM_PUBLISH_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"

      - name: Publish to npm
        if: ${{ !inputs.dryRun }}
        working-directory: dist/tools/openapi-resource-gen
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_PUBLISH_TOKEN }}
