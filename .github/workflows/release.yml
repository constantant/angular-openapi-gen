name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run — skip git push and npm publish'
        type: boolean
        default: false
      firstRelease:
        description: 'First release — no previous tag to diff against'
        type: boolean
        default: false

# contents: write  → create GitHub releases, push version commit + tag
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # full history so nx release can read all commits
          token: ${{ secrets.GITHUB_TOKEN }}

      # registry-url writes an .npmrc pointing at registry.npmjs.org.
      # Without NODE_AUTH_TOKEN set, npm falls through to OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Determines version bump from conventional commits since the last tag,
      # updates tools/openapi-resource-gen/package.json, writes CHANGELOG.md,
      # creates a git commit + tag, and opens a GitHub Release (draft: false).
      - name: Bump version and generate changelog
        run: |
          FLAGS="--skip-publish"
          [[ "${{ inputs.firstRelease }}" == "true" ]] && FLAGS="$FLAGS --first-release"
          npx nx release $FLAGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dry-run stops here — all subsequent steps touch the remote or npm registry.
      - name: Push version commit and tag
        if: ${{ !inputs.dryRun }}
        run: git push --follow-tags origin master

      - name: Create GitHub Release
        if: ${{ !inputs.dryRun }}
        run: |
          VERSION=$(node -p "require('./tools/openapi-resource-gen/package.json').version")
          TAG="openapi-resource-gen@${VERSION}"
          # Extract the section for this version from CHANGELOG.md (content between
          # the "## VERSION" heading and the next "## " heading)
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" \
            tools/openapi-resource-gen/CHANGELOG.md)
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "@constantant/openapi-resource-gen@${VERSION}" \
              --notes "${NOTES:-No changelog entries for this version.}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build after version bump. Nx Cloud may cache the old version; explicitly
      # write the bumped version into dist/package.json after building.
      - name: Build
        run: npx nx build openapi-resource-gen --skip-nx-cache

      - name: Sync version into dist
        run: |
          VERSION=$(node -p "require('./tools/openapi-resource-gen/package.json').version")
          echo "Syncing version $VERSION into dist"
          node -e "
            const fs = require('fs');
            const p = 'dist/tools/openapi-resource-gen/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      # Publish using a granular npm token stored as a GitHub secret.
      # Skips gracefully if the version is already on the registry (idempotent).
      - name: Publish to npm
        if: ${{ !inputs.dryRun }}
        id: publish
        working-directory: dist/tools/openapi-resource-gen
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@constantant/openapi-resource-gen@${VERSION}" version 2>/dev/null | grep -q .; then
            echo "Version ${VERSION} already published — nothing to do."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            npm publish --access public
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write job summary
        run: |
          VERSION="${{ steps.publish.outputs.version }}"
          PUBLISHED="${{ steps.publish.outputs.published }}"
          {
            if [[ "$PUBLISHED" == "true" ]]; then
              echo "## ✅ Published \`@constantant/openapi-resource-gen@${VERSION}\`"
              echo ""
              echo "**npm:** https://www.npmjs.com/package/@constantant/openapi-resource-gen/v/${VERSION}"
              echo ""
              echo "### Changelog"
              # Extract the section for this version from CHANGELOG.md
              awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" \
                tools/openapi-resource-gen/CHANGELOG.md
            else
              echo "## ℹ️ No new version — \`@constantant/openapi-resource-gen@${VERSION}\` already on npm"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
