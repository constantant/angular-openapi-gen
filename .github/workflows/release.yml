name: Release

on:
  workflow_dispatch:
    inputs:
      specifier:
        description: 'Version bump (empty = auto from conventional commits)'
        type: choice
        options: ['', 'patch', 'minor', 'major', 'premajor', 'preminor', 'prepatch', 'prerelease']
        default: ''
      preid:
        description: 'Pre-release id (alpha / beta / rc) — only used with pre* specifier'
        type: string
        default: ''
      dryRun:
        description: 'Dry run — skip git push and npm publish'
        type: boolean
        default: false

# contents: write  → create commits, tags, and GitHub releases
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0         # full history so nx release can read all commits
          # GH_PAT (admin PAT, Contents: write) — GITHUB_TOKEN cannot bypass
          # branch protection's required status checks even with enforce_admins: off,
          # so the version-bump commit/tag push would fail with the default token.
          token: ${{ secrets.GH_PAT }}

      # registry-url writes an .npmrc pointing at registry.npmjs.org and
      # sets up NODE_AUTH_TOKEN forwarding for npm publish.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Determines version bump from conventional commits since the last tag (or
      # from --specifier when provided), updates package.json and CHANGELOG.md,
      # creates a git commit + tag, and creates a GitHub Release.
      # --skip-publish: npm publishing is handled separately so we can add --provenance.
      # --yes: skip interactive confirmation prompts.
      - name: Bump version and generate changelog
        run: |
          FLAGS="--skip-publish"
          [[ -n "${{ inputs.specifier }}" ]] && FLAGS="$FLAGS --specifier=${{ inputs.specifier }}"
          [[ -n "${{ inputs.preid }}" ]] && FLAGS="$FLAGS --preid=${{ inputs.preid }}"
          npx nx release $FLAGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dry-run stops here — all subsequent steps touch the remote or the npm registry.
      - name: Push version commit and tag
        if: ${{ !inputs.dryRun }}
        run: git push --follow-tags origin master

      # Build after the version bump so the dist package.json carries the new version.
      # --skip-nx-cache ensures the build always runs fresh (no stale cached output).
      - name: Build openapi-resource-gen
        run: npx nx build openapi-resource-gen --skip-nx-cache

      - name: Build openapi-resource-mocks
        run: npx nx build openapi-resource-mocks --skip-nx-cache

      - name: Create GitHub Release for openapi-resource-gen
        if: ${{ !inputs.dryRun }}
        run: |
          VERSION=$(node -p "require('./tools/openapi-resource-gen/package.json').version")
          TAG="openapi-resource-gen@${VERSION}"
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" \
            tools/openapi-resource-gen/CHANGELOG.md)
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "@constantant/openapi-resource-gen@${VERSION}" \
              --notes "${NOTES:-No changelog entries for this version.}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release for openapi-resource-mocks
        if: ${{ !inputs.dryRun }}
        run: |
          VERSION=$(node -p "require('./tools/openapi-resource-mocks/package.json').version")
          TAG="openapi-resource-mocks@${VERSION}"
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found{print}" \
            tools/openapi-resource-mocks/CHANGELOG.md)
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "@constantant/openapi-resource-mocks@${VERSION}" \
              --notes "${NOTES:-No changelog entries for this version.}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pre-release versions (1.2.0-beta.1) are published under the "next" dist-tag
      # so that `npm install @constantant/openapi-resource-gen` still gets the stable release.
      # --provenance attaches a signed OIDC provenance attestation (supply-chain security).
      - name: Publish openapi-resource-gen to npm
        if: ${{ !inputs.dryRun }}
        id: publish-gen
        working-directory: dist/tools/openapi-resource-gen
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@constantant/openapi-resource-gen@${VERSION}" version 2>/dev/null | grep -q .; then
            echo "Version ${VERSION} already published — nothing to do."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            NPM_TAG=$(echo "$VERSION" | grep -q '-' && echo "next" || echo "latest")
            npm publish --access public --tag "$NPM_TAG"
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish openapi-resource-mocks to npm
        if: ${{ !inputs.dryRun }}
        id: publish-mocks
        working-directory: dist/tools/openapi-resource-mocks
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@constantant/openapi-resource-mocks@${VERSION}" version 2>/dev/null | grep -q .; then
            echo "Version ${VERSION} already published — nothing to do."
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            NPM_TAG=$(echo "$VERSION" | grep -q '-' && echo "next" || echo "latest")
            npm publish --access public --tag "$NPM_TAG"
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Write job summary
        if: always()
        run: |
          if [[ "${{ inputs.dryRun }}" == "true" ]]; then
            echo "## 🔍 Dry run — no changes were pushed or published" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              GEN_VERSION="${{ steps.publish-gen.outputs.version }}"
              GEN_PUBLISHED="${{ steps.publish-gen.outputs.published }}"
              if [[ "$GEN_PUBLISHED" == "true" ]]; then
                echo "## ✅ Published \`@constantant/openapi-resource-gen@${GEN_VERSION}\`"
                echo ""
                echo "**npm:** https://www.npmjs.com/package/@constantant/openapi-resource-gen/v/${GEN_VERSION}"
                echo ""
                echo "### Changelog"
                awk "/^## ${GEN_VERSION}/{found=1; next} found && /^## /{exit} found{print}" \
                  tools/openapi-resource-gen/CHANGELOG.md
              else
                echo "## ℹ️ No new version — \`@constantant/openapi-resource-gen@${GEN_VERSION}\` already on npm"
              fi
              echo ""
              MOCKS_VERSION="${{ steps.publish-mocks.outputs.version }}"
              MOCKS_PUBLISHED="${{ steps.publish-mocks.outputs.published }}"
              if [[ "$MOCKS_PUBLISHED" == "true" ]]; then
                echo "## ✅ Published \`@constantant/openapi-resource-mocks@${MOCKS_VERSION}\`"
                echo ""
                echo "**npm:** https://www.npmjs.com/package/@constantant/openapi-resource-mocks/v/${MOCKS_VERSION}"
                echo ""
                echo "### Changelog"
                awk "/^## ${MOCKS_VERSION}/{found=1; next} found && /^## /{exit} found{print}" \
                  tools/openapi-resource-mocks/CHANGELOG.md
              else
                echo "## ℹ️ No new version — \`@constantant/openapi-resource-mocks@${MOCKS_VERSION}\` already on npm"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
