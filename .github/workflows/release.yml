name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run — skip git push and npm publish'
        type: boolean
        default: false
      firstRelease:
        description: 'First release — no previous tag to diff against'
        type: boolean
        default: false

# contents: write  → create GitHub releases, push version commit + tag
# id-token: write  → npm trusted publishing (OIDC — no token needed)
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0         # full history so nx release can read all commits
          token: ${{ secrets.GITHUB_TOKEN }}

      # registry-url writes an .npmrc pointing at registry.npmjs.org.
      # Without NODE_AUTH_TOKEN set, npm falls through to OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Determines version bump from conventional commits since the last tag,
      # updates tools/openapi-resource-gen/package.json, writes CHANGELOG.md,
      # creates a git commit + tag, and opens a GitHub Release (draft: false).
      - name: Bump version and generate changelog
        run: |
          FLAGS="--skip-publish"
          [[ "${{ inputs.firstRelease }}" == "true" ]] && FLAGS="$FLAGS --first-release"
          npx nx release $FLAGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Dry-run stops here — all subsequent steps touch the remote or npm registry.
      - name: Push version commit and tag
        if: ${{ !inputs.dryRun }}
        run: git push --follow-tags origin master

      # Build after version bump. Nx Cloud may cache the old version; explicitly
      # write the bumped version into dist/package.json after building.
      - name: Build
        run: npx nx build openapi-resource-gen --skip-nx-cache

      - name: Sync version into dist
        run: |
          VERSION=$(node -p "require('./tools/openapi-resource-gen/package.json').version")
          echo "Syncing version $VERSION into dist"
          node -e "
            const fs = require('fs');
            const p = 'dist/tools/openapi-resource-gen/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      # Trusted publishing: npm CLI exchanges the GitHub OIDC token for publish
      # credentials automatically. No NPM_TOKEN secret required.
      # --provenance triggers npm's OIDC token exchange with the trusted publisher.
      # NODE_AUTH_TOKEN must be absent: setup-node sets it to GITHUB_TOKEN, and
      # both the .npmrc _authToken entry and the env var block OIDC detection.
      - name: Debug npm trusted publishing environment
        if: ${{ !inputs.dryRun }}
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "OIDC URL set: $([ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo YES || echo NO)"
          echo "npmrc content:"
          cat "${NPM_CONFIG_USERCONFIG}" || echo "(empty)"
          echo "npm config registry:"
          npm config get registry
        env:
          NODE_AUTH_TOKEN: ""

      - name: Publish to npm
        if: ${{ !inputs.dryRun }}
        working-directory: dist/tools/openapi-resource-gen
        run: |
          sed -i '/authToken/d' "${NPM_CONFIG_USERCONFIG}"
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""

      - name: Show npm debug log on failure
        if: failure()
        run: cat ~/.npm/_logs/*.log 2>/dev/null | tail -100 || echo "no npm debug log"
