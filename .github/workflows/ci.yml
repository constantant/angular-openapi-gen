name: CI

on:
  push:
    branches:
      - master
  pull_request:

# Cancel superseded runs on the same branch/PR so pushes don't pile up runners.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --with-deps

      - name: Derive SHAs for Nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Detect affected projects
        id: affected
        run: |
          PROJECTS=$(npx nx show projects --affected --base=$NX_BASE --head=$NX_HEAD --json)
          echo "json=$PROJECTS" >> "$GITHUB_OUTPUT"

      - name: Run CI tasks (affected only)
        run: npx nx affected -t lint test build e2e

      - name: Write job summary
        if: always()
        env:
          AFFECTED_JSON: ${{ steps.affected.outputs.json }}
        run: |
          {
            echo "## CI · lint · test · build · e2e"
            echo ""
            node -e '
              const p = JSON.parse(process.env.AFFECTED_JSON || "[]");
              if (!p.length) { console.log("_No affected projects._"); }
              else { p.sort().forEach(n => console.log("- `" + n + "`")); }
            '
          } >> "$GITHUB_STEP_SUMMARY"
