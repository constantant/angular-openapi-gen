version: 2
updates:
  # npm dependencies at the workspace root
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
    groups:
      # Angular and Nx are tightly version-locked across many packages —
      # group each family so they bump together in a single, reviewable PR.
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@schematics/angular"
      nx:
        patterns:
          - "nx"
          - "@nx/*"
      # Everything else: collect minor/patch bumps to cut PR noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the CI and release workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
