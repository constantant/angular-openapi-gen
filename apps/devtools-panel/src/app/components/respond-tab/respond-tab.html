@if (selectedEntry(); as entry) {
  <mat-toolbar class="panel-header">
    <span class="key-label" [title]="entry.key">{{ entry.key }}</span>
    <span class="spacer"></span>
    @if (entry.catchMode) {
      <span class="catch-badge">CATCH</span>
    }
  </mat-toolbar>

  @if (pendingArgsJson()) {
    <div class="caught-section">
      <div class="caught-label">Caught request args</div>
      <pre class="caught-args">{{ pendingArgsJson() }}</pre>
    </div>
  }

  <div class="respond-body">
    <mat-form-field appearance="outline" class="json-field">
      <mat-label>Response (JSON)</mat-label>
      <textarea matInput
                [value]="json()"
                (input)="onJsonInput($any($event.target).value)"
                rows="8"
                spellcheck="false"
                placeholder="null"
                class="json-textarea"></textarea>
      @if (jsonError()) {
        <mat-error>{{ jsonError() }}</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="delay-field">
      <mat-label>Delay (ms)</mat-label>
      <input matInput type="number" min="0" placeholder="0"
             [value]="delay()"
             (input)="delay.set($any($event.target).value)" />
    </mat-form-field>

    <div class="action-row">
      <button mat-flat-button (click)="resolve()" [disabled]="!!jsonError()">
        {{ entry.pendingRequest ? 'Release → Resolve' : 'Resolve' }}
      </button>
      <button mat-stroked-button (click)="bridge.sendControl(entry.key, 'setLoading')">Loading</button>
      <button mat-stroked-button color="warn" (click)="fail()">
        {{ entry.pendingRequest ? 'Release → Fail' : 'Fail' }}
      </button>
      <button mat-stroked-button (click)="bridge.sendControl(entry.key, 'reset')">Reset</button>
    </div>
  </div>
}
