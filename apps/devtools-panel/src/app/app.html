<mat-toolbar class="toolbar">
  <span class="brand">API Mocks</span>
  <span class="count">
    @if (mockCount() === 0) { no mocks }
    @else { {{ mockCount() }} mock{{ mockCount() === 1 ? '' : 's' }} }
  </span>
  <button mat-button (click)="bridge.refresh()">↺ Refresh</button>
  <button mat-button
          [class.catch-all-active]="catchAllActive()"
          [matTooltip]="catchAllActive() ? 'Disable catch mode on all mocks' : 'Enable catch mode on all mocks'"
          (click)="toggleCatchAll()">⏸ Catch All</button>
  <button mat-button (click)="bridge.clearAll()">Clear</button>
  <button mat-button (click)="bridge.resetAll()">Reset All</button>
  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="filter-field">
    <input matInput placeholder="Filter…"
           [value]="filter()"
           (input)="filter.set($any($event.target).value)" />
  </mat-form-field>
</mat-toolbar>

<nav mat-tab-nav-bar [tabPanel]="pagePanel" class="page-nav">
  <button mat-tab-link [active]="page() === 'mocks'" (click)="page.set('mocks')">Mocks</button>
  <button mat-tab-link [active]="page() === 'specs'" (click)="page.set('specs')">Specs</button>
</nav>

<mat-tab-nav-panel #pagePanel class="page-body">
  @if (page() === 'mocks') {
    <div class="main">
      <app-mock-table [filter]="filter()" />

      @if (selectedEntry()) {
        <div class="resize-handle" (pointerdown)="startResize($event)"></div>
        <div class="right-panel" [style.width.px]="rightPanelWidth()">
          <nav mat-tab-nav-bar [tabPanel]="tabPanel" mat-stretch-tabs>
            <button mat-tab-link [active]="rightTab() === 'respond'"
                    (click)="rightTab.set('respond')">Respond</button>
            <button mat-tab-link [active]="rightTab() === 'history'"
                    (click)="rightTab.set('history')">History</button>
          </nav>
          <mat-tab-nav-panel #tabPanel class="tab-body">
            @if (rightTab() === 'respond') {
              <app-respond-tab />
            } @else {
              <app-history-tab />
            }
          </mat-tab-nav-panel>
        </div>
      }
    </div>
  } @else {
    <app-specs-tab class="specs-page" [page]="page" />
  }
</mat-tab-nav-panel>
