<div class="page">
  <h1 class="mat-headline-medium">Pets</h1>

  <mat-chip-listbox
    [value]="status()"
    (change)="status.set($event.value)"
    class="filter-chips">
    @for (s of statusOptions; track s) {
      <mat-chip-option [value]="s">{{ s }}</mat-chip-option>
    }
  </mat-chip-listbox>

  @if (petsByStatus.isLoading()) {
    <mat-progress-bar mode="indeterminate" />
  } @else if (petsByStatus.error()) {
    <p class="mat-body-2 error">Failed to load pets</p>
  } @else {
    <mat-list>
      @for (pet of $any(petsByStatus.value()) ?? []; track pet.id) {
        <mat-list-item>
          <span matListItemTitle>{{ pet.name }}</span>
          <span matListItemMeta>
            <mat-chip highlighted>{{ pet.status }}</mat-chip>
          </span>
        </mat-list-item>
      }
    </mat-list>
  }
</div>
